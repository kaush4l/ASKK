<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ASKK lsp-python worker harness</title>
    <style>
      body {
        background: #16131f;
        color: #d6cfe8;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        margin: 2rem auto;
        max-width: 60rem;
        padding: 0 1rem;
      }
      h1 { font-size: 1.1rem; }
      .phase { border: 1px solid #2e2742; border-radius: 6px; margin: 1rem 0; padding: 0.75rem 1rem; }
      .phase h2 { font-size: 0.95rem; margin: 0 0 0.5rem; color: #a99cc4; }
      pre { background: #131019; border-radius: 4px; overflow-x: auto; padding: 0.5rem; white-space: pre-wrap; }
      .pass { color: #7dd87d; }
      .fail { color: #ff7b87; }
      #verdict { font-size: 1rem; font-weight: bold; margin: 1rem 0; }
    </style>
  </head>
  <body>
    <h1>ASKK lsp-python worker harness</h1>
    <p>
      Drives <code>assets/lsp_py_worker.js</code> through the language-service
      postMessage protocol and renders every <code>publishDiagnostics</code>
      payload below. Serve the repo root (e.g.
      <code>python3 -m http.server 8207</code>) and open
      <code>/scripts/lsp-python/test/index.html</code>.
    </p>
    <div id="status">booting worker…</div>
    <div id="verdict"></div>
    <div id="diags"></div>

    <script>
      "use strict";

      // Phase 1: an unused import (F401 on `os`) and an undefined name
      // (F821 on `undefined_name`).
      const DOC_OPEN = "import os\n\nprint(undefined_name)\n";
      // Phase 2: a syntax error.
      const DOC_SYNTAX = "def broken(:\n    pass\n";
      // Phase 3: a clean file — must publish an empty array (clears stale).
      const DOC_CLEAN = 'GREETING = "hello"\nprint(GREETING)\n';

      const PATH = "main.py";
      const statusEl = document.getElementById("status");
      const verdictEl = document.getElementById("verdict");
      const diagsEl = document.getElementById("diags");

      const failures = [];
      let phase = 0;
      let repliesSeen = 0;

      function renderPhase(title, payload, checks) {
        const section = document.createElement("div");
        section.className = "phase";
        const heading = document.createElement("h2");
        heading.textContent = title;
        section.appendChild(heading);
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(payload, null, 2);
        section.appendChild(pre);
        for (const [label, ok] of checks) {
          const line = document.createElement("div");
          line.className = ok ? "pass" : "fail";
          line.textContent = `${ok ? "PASS" : "FAIL"}: ${label}`;
          section.appendChild(line);
          if (!ok) failures.push(label);
        }
        diagsEl.appendChild(section);
      }

      function finishIfDone() {
        if (phase >= 3 && repliesSeen >= 2) {
          verdictEl.textContent = failures.length === 0 ? "ALL PASS" : `${failures.length} FAILED`;
          verdictEl.className = failures.length === 0 ? "pass" : "fail";
          statusEl.textContent = "done";
        }
      }

      const worker = new Worker(new URL("../../../assets/lsp_py_worker.js", location.href));
      worker.onerror = (event) => {
        statusEl.textContent = `WORKER ERROR: ${event.message || "(no message)"}`;
        verdictEl.textContent = "1 FAILED";
        verdictEl.className = "fail";
      };

      worker.onmessage = (event) => {
        const msg = event.data || {};

        // Request/response pairs (graceful empties from a diagnostics-only service).
        if (msg.id !== undefined) {
          repliesSeen += 1;
          if (msg.id === 1) {
            renderPhase("completion reply (id 1)", msg, [
              [
                "completion replies { id, result: { items: [] } }",
                !!msg.result && Array.isArray(msg.result.items) && msg.result.items.length === 0,
              ],
            ]);
          } else if (msg.id === 2) {
            renderPhase("hover reply (id 2)", msg, [
              ["hover replies { id, result: { contents: \"\" } }", !!msg.result && msg.result.contents === ""],
            ]);
          }
          finishIfDone();
          return;
        }

        if (msg.method !== "publishDiagnostics") return;
        phase += 1;
        const diagnostics = msg.diagnostics || [];

        if (phase === 1) {
          const from821 = DOC_OPEN.indexOf("undefined_name");
          const to821 = from821 + "undefined_name".length;
          const from401 = DOC_OPEN.indexOf("os");
          const to401 = from401 + "os".length;
          const f821 = diagnostics.find((d) => d.message.startsWith("F821"));
          const f401 = diagnostics.find((d) => d.message.startsWith("F401"));
          renderPhase("publish 1 — undefined name + unused import", msg, [
            ["path is main.py", msg.path === PATH],
            ["F821 diagnostic present", !!f821],
            ["F821 severity is error", !!f821 && f821.severity === "error"],
            [
              `F821 span is exactly the identifier (${from821}..${to821})`,
              !!f821 && f821.from === from821 && f821.to === to821,
            ],
            ["F401 unused import flagged", !!f401],
            [`F401 span covers \`os\` (${from401}..${to401})`, !!f401 && f401.from === from401 && f401.to === to401],
          ]);
          worker.postMessage({ method: "didChange", path: PATH, text: DOC_SYNTAX });
        } else if (phase === 2) {
          const syntax = diagnostics.find((d) => d.severity === "error" && d.message.includes("SyntaxError"));
          renderPhase("publish 2 — syntax error", msg, [
            ["syntax error reported with severity error", !!syntax],
            [
              "syntax error span is sane (0 <= from <= to <= len)",
              !!syntax && syntax.from >= 0 && syntax.from <= syntax.to && syntax.to <= DOC_SYNTAX.length,
            ],
          ]);
          worker.postMessage({ method: "didChange", path: PATH, text: DOC_CLEAN });
        } else if (phase === 3) {
          renderPhase("publish 3 — clean file clears diagnostics", msg, [
            ["diagnostics array is empty", diagnostics.length === 0],
          ]);
        }
        finishIfDone();
      };

      worker.postMessage({ method: "initialize", files: [] });
      worker.postMessage({ method: "didOpen", path: PATH, text: DOC_OPEN });
      worker.postMessage({ id: 1, method: "completion", path: PATH, offset: 5 });
      worker.postMessage({ id: 2, method: "hover", path: PATH, offset: 5 });
      statusEl.textContent = "waiting for diagnostics…";
    </script>
  </body>
</html>
